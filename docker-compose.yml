services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder # Use builder stage for development (hot-reload friendly)
    image: devnest-vanilla:dev
    container_name: devnest-app
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=5000
      # Override secrets via a .env file or Docker secrets in production
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-dev-access-secret-change-in-production-min-32-chars}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production-min-32-chars}
      - SESSION_SECRET=${SESSION_SECRET:-dev-session-secret-change-in-production-min-32-chars}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5000,http://localhost:3000}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    ports:
      - "5000:5000"
    volumes:
      # Mount data directory so JSON files survive container restarts
      - ./data:/app/data
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
